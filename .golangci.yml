linters:
  enable:
    - staticcheck
    - gosec
    - revive
    - errcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - gofmt

linters-settings:
  gosec:
    excludes:
      - G204  # subprocess via variable — intentional; ocarina's purpose is launching user-specified MCP servers
  revive:
    rules:
      - name: exported
        disabled: true  # small CLI, not a library

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
