server:
  command: npx
  args: [-y, "@modelcontextprotocol/server-filesystem", /private/tmp]

tracks:
  - name: list /tmp root
    tool: list_directory
    args:
      path: /private/tmp

  - name: write a file
    tool: write_file
    args:
      path: /private/tmp/ocarina-demo.txt
      content: "hello from ocarina playbook"

  - name: read it back
    tool: read_file
    args:
      path: /private/tmp/ocarina-demo.txt
