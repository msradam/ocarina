vars:
  library: react

server:
  command: npx
  args: ["-y", "@upstash/context7-mcp"]

rondo:
  - name: resolve library ID
    tool: resolve-library-id
    args:
      libraryName: "{{library}}"
    register: library_id
    expect:
      contains: react

  - name: fetch library docs
    tool: get-library-docs
    args:
      context7CompatibleLibraryID: "{{library_id}}"
    expect:
      contains: react
