vars: {}
server:
  command: npx
  args: ["-y", "astronomy-oracle"]
rondo:
  - name: lookup Mars
    tool: lookup_object
    args:
      name: Mars
    expect:
      contains: Mars
  - name: search galaxies
    tool: search_objects
    args:
      query: spiral galaxy
      limit: 3
    expect:
      contains: Galaxy
