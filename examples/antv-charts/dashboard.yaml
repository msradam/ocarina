notes: {}

server:
  command: npx
  args: ["-y", "@antv/mcp-server-chart"]

tracks:
  - name: monthly revenue bar chart
    tool: generate_bar_chart
    args:
      data:
        - x: Jan
          y: 42000
        - x: Feb
          y: 48000
        - x: Mar
          y: 51000
        - x: Apr
          y: 45000
      xField: x
      yField: y
    expect:
      contains: http

  - name: growth trend line chart
    tool: generate_line_chart
    args:
      data:
        - x: Q1
          y: 141000
        - x: Q2
          y: 158000
        - x: Q3
          y: 172000
        - x: Q4
          y: 195000
      xField: x
      yField: y
    expect:
      contains: http

  - name: revenue share pie chart
    tool: generate_pie_chart
    args:
      data:
        - type: North
          value: 220000
        - type: South
          value: 180000
        - type: West
          value: 145000
      angleField: value
      colorField: type
    expect:
      contains: http
