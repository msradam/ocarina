vars:
  principal: "10000"
  rate: "0.07"
  years: "10"

server:
  command: uvx
  args: ["mcp-server-math"]

rondo:
  - name: annual interest amount
    tool: multiply
    args:
      a: "{{principal}}"
      b: "{{rate}}"
    register: annual_interest

  - name: value after year 1
    tool: sum
    args:
      a: "{{principal}}"
      b: "{{annual_interest}}"
    register: year1

  - name: interest on year 1 balance
    tool: multiply
    args:
      a: "{{year1}}"
      b: "{{rate}}"
    register: year1_interest

  - name: value after year 2
    tool: sum
    args:
      a: "{{year1}}"
      b: "{{year1_interest}}"
    register: year2
    expect:
      contains: "11449"
