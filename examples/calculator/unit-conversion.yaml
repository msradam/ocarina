vars:
  miles: "26.2188"

server:
  command: uvx
  args: ["mcp-server-calculator"]

rondo:
  - name: marathon distance in kilometers
    tool: calculate
    args:
      expression: "{{miles}} * 1.60934"
    register: km
    expect:
      contains: "42"

  - name: kilometers to meters
    tool: calculate
    args:
      expression: "{{km}} * 1000"
    register: meters
    expect:
      contains: "42"

  - name: meters to centimeters
    tool: calculate
    args:
      expression: "{{meters}} * 100"
    expect:
      contains: "4219"
