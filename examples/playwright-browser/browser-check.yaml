keys:
  target_url: https://example.com

server:
  command: npx
  args: ["-y", "@playwright/mcp"]

rondo:
  - name: navigate to page
    tool: browser_navigate
    args:
      url: "{{target_url}}"

  - name: snapshot accessibility tree
    tool: browser_snapshot
    args: {}
    expect:
      contains: Example
