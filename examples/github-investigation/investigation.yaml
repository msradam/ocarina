vars:
  owner: msradam
  repo: ocarina

server:
  command: npx
  args: ["-y", "@modelcontextprotocol/server-github"]

rondo:
  - name: search ocarina repo
    tool: search_repositories
    args:
      query: "ocarina owner:{{owner}}"
    expect:
      contains: ocarina

  - name: list open issues
    tool: list_issues
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
      state: open

  - name: list recent commits
    tool: list_commits
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
    expect:
      contains: "{{owner}}"
