vars:
  owner: pytorch
  repo: pytorch

server:
  command: npx
  args: ["-y", "@modelcontextprotocol/server-github"]
  env:
    GITHUB_PERSONAL_ACCESS_TOKEN: "{{env.GITHUB_PERSONAL_ACCESS_TOKEN}}"

rondo:
  - name: latest commit
    tool: list_commits
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
      per_page: 1
    grab: ".0.sha"
    register: latest_sha

  - name: commit message
    tool: list_commits
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
      per_page: 1
    grab: ".0.commit.message"

  - name: recent open issues
    tool: list_issues
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
      state: open
      per_page: 5
    grab: ".0.title"

  - name: open pull requests
    tool: list_pull_requests
    args:
      owner: "{{owner}}"
      repo: "{{repo}}"
      state: open
      per_page: 3
    grab: ".0.title"
